#:schema https://yazi-rs.github.io/schemas/theme.json

[mgr]
cwd = { fg = "white" }
# Hovered
# hovered = { fg = "white", bg = "magenta" }
# preview_hovered = { fg = "magenta", underline = true }
# Find
find_keyword = { fg = "yellow", italic = true }
find_position = { fg = "white", italic = true }
# Marker
marker_copied = { fg = "lightyellow" }
marker_cut = { fg = "lightred" }
marker_marked = { fg = "magenta" }
marker_selected = { fg = "blue" }
# Count
count_copied = { fg = "black", bg = "yellow" }
count_cut = { fg = "white", bg = "red" }
count_selected = { fg = "white", bg = "magenta" }
# Border
border_symbol = "Ōöé"
border_style = { fg = "white" }

symlink_target = { italic = true }
# Offset
# folder_offset = [1, 0, 1, 0]
# preview_offset = [1, 1, 1, 1]

[status]
sep_left = { open = "ŅéČ", close = "Ņé┤" }
sep_right = { open = "ŅéČ", close = "Ņé┤" }

# Progress
progress_label = { bold = true }
progress_normal = { fg = "white" }
progress_error = { fg = "red" }
# Permissions
perm_sep = { fg = "darkgray" }
perm_type = { fg = "lightgreen" }
perm_read = { fg = "lightyellow" }
perm_write = { fg = "lightred" }
perm_exec = { fg = "lightcyan" }

[mode]
normal_main = { fg = "white", bg = "magenta", bold = true }
normal_alt = { fg = "blue", bg = "gray", bold = true }
select_main = { fg = "white", bg = "magenta", bold = true }
select_alt = { fg = "red", bg = "gray" }
unset_main = { fg = "white", bg = "magenta", bold = true }
unset_alt = { fg = "red", bg = "gray" }

[indicator]
parent = { reversed = true }
current = { reversed = true }
preview = { underline = true }
padding = { open = "ŅéČ", close = "Ņé┤" }

# Tab
[tabs]
active = { fg = "white", bg = "magenta" }
inactive = { fg = "white", bg = "darkgray" }

[select]
border = { fg = "blue" }
active = { fg = "magenta" }
inactive = {}

[input]
border = { fg = "white" }
title = {}
value = {}
selected = { reversed = true }

[cmp]
border = { fg = "blue" }
active = { bg = "darkgray" }
inactive = {}
icon_file = "’ģø"
icon_folder = "’äĢ"
icon_command = "’Æē"

[tasks]
border = { fg = "blue" }
title = {}
hovered = { underline = true }

[which]
mask = {}
cand = { fg = "lightcyan" }
rest = { fg = "darkgray" }
desc = { fg = "white" }
separator = " Ņ¬£ "
separator_style = { fg = "darkgray" }

[help]
on = { fg = "magenta" }
run = { fg = "cyan" }
desc = { fg = "gray" }
hovered = { bg = "darkgray", bold = true }
footer = { fg = "black", bg = "white" }

[filetype]
rules = [
  # Images
  { mime = "image/*", fg = "cyan" },
  # Videos
  { mime = "video/*", fg = "yellow" },
  { mime = "audio/*", fg = "yellow" },
  # Archives
  { mime = "application/zip", fg = "magenta" },
  { mime = "application/gzip", fg = "magenta" },
  { mime = "application/x-tar", fg = "magenta" },
  { mime = "application/x-bzip", fg = "magenta" },
  { mime = "application/x-bzip2", fg = "magenta" },
  { mime = "application/x-7z-compressed", fg = "magenta" },
  { mime = "application/x-rar", fg = "magenta" },
  { mime = "application/xz", fg = "magenta" },
  # Documents
  { mime = "application/doc", fg = "green" },
  { mime = "application/pdf", fg = "green" },
  { mime = "application/rtf", fg = "green" },
  { mime = "application/vnd.*", fg = "green" },
  # Fallback
  { url = "*/", fg = "blue" },
]

